<!DOCTYPE html>
<html>
<head>
  <title>掲示板</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    #post-form {
      margin-bottom: 20px;
    }
    #post-form input[type="text"],
    #post-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    #post-list {
      list-style-type: none;
      padding: 0;
    }
    .post {
      background-color: #f5f5f5;
      padding: 10px;
      margin-bottom: 10px;
    }
    .post .timestamp {
      font-size: 12px;
      color: #888;
    }
    .post .message {
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>掲示板</h1>

  <div id="post-form">
    <input type="text" id="name-input" placeholder="名前">
    <textarea id="message-input" placeholder="メッセージ"></textarea>
    <button onclick="addPost()">投稿する</button>
  </div>

  <ul id="post-list"></ul>

  <script>
    // メモリ内に投稿リストを保存する配列
    var posts = [];

    // ページが読み込まれた時に保存された投稿を表示
    window.onload = function() {
      var savedPosts = localStorage.getItem("posts");
      if (savedPosts) {
        posts = JSON.parse(savedPosts);
        displayPosts();
      }
    };

    // 投稿を追加する関数
    function addPost() {
      var nameInput = document.getElementById("name-input");
      var messageInput = document.getElementById("message-input");

      var name = nameInput.value.trim();
      var message = messageInput.value.trim();

      if (name === "" || message === "") {
        alert("名前とメッセージを入力してください。");
        return;
      }

        name: name,
        message: message,

      // 入力欄をリセット
      nameInput.value = "";
      messageInput.value = "";

      // 投稿を表示
      displayPosts();
    }
